name: Build FFmpeg for Linux ARM64

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # GitHub ARM64 runner available
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential meson ninja-build \
            pkg-config autoconf automake libtool yasm nasm

      - name: Clone latest FFmpeg
        run: |
          git clone https://github.com/FFmpeg/FFmpeg.git ffmpeg
          echo "FFMPEG_SOURCE_DIR=$GITHUB_WORKSPACE/ffmpeg" >> $GITHUB_ENV

      - name: Create build directory
        run: |
          mkdir -p ffmpeg-build
          echo "FFMPEG_BUILD_DIR=$GITHUB_WORKSPACE/ffmpeg-build" >> $GITHUB_ENV

      - name: Run build script
        run: |
          chmod +x ./linuxarm64.sh
          ./linuxarm64.sh

      - name: Upload FFmpeg build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-linux-arm64-build
          path: ffmpeg-build/
